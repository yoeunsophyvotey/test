<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body style="background-image: url(https://i.pinimg.com/736x/8c/37/81/8c37813608bd1e2bb473a045ab00bff2.jpg); background-size: cover; background-repeat: none;">
    
    <h1 style="color: rgb(246, 119, 140); font-size: 50px; text-align: center;"><i><u>Login Form</u></i></h1>
    <hr size="5" color="pink">
    <form action="Login" style="width: 30vw; height: 60vh; margin: auto; border: 2px solid gray; border-radius: 30px; background-color:rgba(255, 255, 255, 0.315); padding: 30px; margin-top: 30px; border: none; box-sizing: 10px 10px 10px white;">
        <h2 style="color: palevioletred; font-size: 40px; text-align: center; ">Login</h2>
        <label style="font-size: 25px;" for="email">Email: </label><br>
        <input style="background-color: white; width: 97%; height: 55px; border: 1px solid gray; border-radius: 20px; margin-top: 5px; font-size: 20px;" type="email" placeholder="">
        <br><br>
        <label style="font-size: 25px;" for="password">Password: </label><br>
        <input style="background-color: white; width: 97%; height: 55px; border: 1px solid gray; border-radius: 20px; margin-top: 5px; font-size: 20px;" type="password" placeholder="">
        <p style="text-align: center; color: rgb(247, 79, 107)"><u>Forget Password</u></p>
        <button style=" background-color: rgb(254, 140, 159); font-size: 30px; width: 98%; height: 60px; border-radius: 30px; color: rgb(246, 43, 76); border: none; ">Login</button>
        <p style="text-align: center; color: rgb(247, 79, 107);">Don't have an account?<a style="color: rgb(246, 119, 140);" href="register.html">Register</a></p>
    </form>
    
</body>
</html>
