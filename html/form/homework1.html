<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body background="https://i.pinimg.com/736x/97/e4/10/97e410e9e0b698347c5bfee4c5b2e248.jpg" style="background-size: cover;">
    
    <form action="" style="width: 40%; height: 40%; margin: auto; margin-top: 100px; padding: 20px; border: 5px black; background-color: rgba(255, 255, 255, 0.37); font-size: 30px; border-radius: 50px; box-shadow: 10px 10px 10px rgba(255, 255, 255, 0.705);">
        <p style="text-align: center; color: rgb(246, 79, 107); font-size: 40px;"><b>User Login</b></p>
        <br>
        <label for="">Username:</label>
        <input style="width: 98%; height: 40px; border-radius: 15px; font-size: 20px;" type="text" placeholder="Enter username">
        <br><br>
        <label for="">Password:</label>
        <input style="width: 98%; height: 40px; border-radius: 15px; font-size: 20px;" type="password" placeholder="Enter password">
        <br><br>
        <label for="">Email:</label>
        <input style="width: 98%; height: 40px; border-radius: 15px; font-size: 20px;" type="text" name="" id="" placeholder="Enter your email">
        <br><br>
        <button style="width: 90%; height: 55px; font-size: 25px; background-color: pink; margin: 30px; border-radius: 50px; border: none; color: rgb(246, 79, 107);"><b>Login</b></button>
    </form>
</body>
</html>
