<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag</title>
</head>
<body style="background-image: url(https://i.pinimg.com/1200x/f9/20/ff/f920ff907050d8cc83643f185f325895.jpg); background-size: cover; background-repeat: none;"">
    <h1 style="color: brown; font-size: 50px; text-align: center;"><u><i>Form</i></u></h1>
    <hr size="5" color="brown">

    <form action=""  style="width: 40%; height: 40%; margin: auto; padding: 20px; border: 5px solid brown; align-items: center; font-size: 25px; background-color: rgba(255, 245, 231, 0.463); border-radius: 50px; ">
        <p style="color:brown; font-size: 30px; text-align: center;">Register</p>
        <br>
        <label for="">Enter username:</label><br>
        <input style="width: 98%; height: 40px; border-radius: 15px; font-size: 20px; " type="text" placeholder="Username">
        <br><br>
        <label for="">Enter password</label><br>
        <input style="width: 98%; height: 40px; border-radius: 15px; font-size: 20px;" type="text" placeholder="Password">
        <br><br>
        <label for="">Confirm password</label><br>
        <input style="width: 98%; height: 40px; border-radius: 15px; font-size: 20px;" type="text" placeholder="Confirm Password">
        <br><br>
        <label for="">Enter Email</label><br>
        <input style="width: 98%; height: 40px; border-radius: 15px; font-size: 20px;" type="text" placeholder="Email">
        <br><br>
        <button style="width: 90%; font-size: 25px; height: 55px; background-color: rgb(219, 66, 66); margin: 30px; border-radius: 50px;">Sign Up</button>
        <br><br>
    </form>

</body>
</html>
