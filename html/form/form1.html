<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body style="background-image: url(https://i.pinimg.com/736x/e6/55/1f/e6551faa0de4dd86176b2a4f162c713a.jpg); background-size: cover; background-repeat: none;" >
    <h1 style="text-align: center;
               font-size: 60px;
               color: rgb(248, 198, 28);"><i><u>Cake Shop</u></i></h1>
    <form action="" style="width: 30vw; 
                           height: 50vh;
                           border: 2px solid yellow; 
                           border-radius: 15px; 
                           margin: auto; 
                           padding: 30px; 
                           background-color: rgba(254, 254, 134, 0.169); ">
        <h2 style="text-align: center; 
                   font-family:Georgia, 'Times New Roman', Times, serif; 
                   font-size: 40px;">Please choose</h2>
        <label for="" style="font-size: 30px; 
                            font-family: Georgia, 'Times New Roman', Times, serif;"><b>Product</b></label>
        <select name="" id="" style="width: 100%; 
                                     height: 45px; border: 2px solid gray; 
                                     margin-top: 20px; 
                                     border-radius: 10px; 
                                     font-size: 30px; 
                                     font-family: Georgia, 'Times New Roman', Times, serif;">
            <option value="">Cake 20$</option>
            <option value="">Bread 5$</option>
            <option value="">Cupcake 3.5$</option>
            <option value="">Tiramissue 10$</option>
            <option value="">Velvet cake 12$</option>
        </select>
        <br><br>
        <label for="" style="font-family: Georgia, 'Times New Roman', Times, serif;
                             font-size: 30px;"><b>Quantity</b></label><br><br>
        <input type="number" style="width: 98%; 
                                    height: 50px; 
                                    border: 2px solid black; 
                                    border-radius: 10px; 
                                    font-size: 30px; 
                                    font-family: Georgia, 'Times New Roman', Times, serif;"><BR></BR><br>
        <button style="font-family: Georgia, 'Times New Roman', Times, serif;
                       display: block; 
                       margin: auto; 
                       width: 30%;
                       height: 50px;
                       border-radius: 20px;
                       font-size: 20px;
                       background-color: rgb(248, 198, 28);
                       border-color: rgb(248, 198, 28);"><i>Buy Now</i></button>
    </form>
</body>
</html>
