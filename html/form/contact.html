<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body style="background-image: url(https://i.pinimg.com/736x/ed/10/bf/ed10bfe7ec8a97769e3586ef6d3a3b45.jpg); background-size: cover; background-repeat: none;">
    <h1 style="text-align: center; font-size: 60px; color:rgb(131, 201, 236);"><b><i>Contact Us</i></b></h1>
    <hr size="1" color="blue">
    <form action="" style="margin: auto; width: 40vw; height: 70vh; margin: auto; padding: 20px; border: 2px solid rgba(0, 0, 255, 0.34); border-radius: 30px; background-color: rgba(188, 253, 253, 0.363); ">
        <h2 style="text-align: center; font-size: 45px; color: rgb(133, 196, 228);">Your Details</h2>
        <label style="font-size: 30px;" for="">Name * : </label>
        <input style="font-size: 25px; border-radius: 15px; width: 81%; height: 50px; border-color:rgb(133, 196, 228);" type="text" placeholder="Enter Your Name">
        <br><br>
        <label style="font-size: 30px;" for="">Email Address * : </label>
        <input style="font-size: 25px; border-radius: 15px; width: 67%; height: 50px; border-color:rgb(133, 196, 228);" type="email" name="" id="" placeholder="Enter Your Email">
        <br><br>
        <label style="font-size: 30px;" for="">Comments/Questions/Request : </label><br><br>
        <textarea style="font-size: 20px; border-radius: 15px; border-color:rgb(133, 196, 228);" name="" id="" cols="65" rows="9" ></textarea>
        <br><br>
        <button style="font-size: 25px; width: 10vw; height: 6vh; display: block; margin: auto; border-radius: 40px; background-color: rgb(100, 100, 250, 0.201); border-color: rgb(133, 196, 228); color: aliceblue;" type="submit"><b><i>Submit</i></b></button>
    </form>
</body>
</html>
