<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <!-- 1 -->
    <div class="container-fluid shadow p-4 sticky-top ">
        <h1 style="font-style: italic; font-weight: bold; font-size: 40px;">Stock Inventory Dashboard</h1>
        <p>Manage and track your inventory</p>
    </div>
    <!-- 2 -->
    <div class="container-fluid p-4 bg-warning-subtle align-items-center rounded-4 text-danger fs-5">
        <p>Hello</p>
    </div>
     <!-- 3 -->
    <div class="container-fluid p-4">
        <div class="row g-2">
            <div class="col border-0">
                <div class="card show h-100 p-2">
                    <div class="d-flex justify-content-between ">
                        <div>
                            <p>Total Product</p>
                            <h3>1190</h3>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" fill="currentColor" class="bi bi-box" viewBox="0 0 16 16">
                            <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464z"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="col border-0">
                <div class="card show h-100 p-2">
                    <div class="d-flex justify-content-between ">
                        <div>
                            <p>Total Order</p>
                            <h3>1190</h3>
                        </div>
                            <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" fill="currentColor" class="bi bi-bag" viewBox="0 0 16 16">
                            <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
                            </svg>
                    </div>
                </div>
            </div>
            <div class="col border-0">
                <div class="card show h-100 p-2">
                    <div class="d-flex justify-content-between ">
                        <div>
                            <p>Customers</p>
                            <h3>1190</h3>
                        </div>
                            <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                            </svg>
                    </div>
                </div>
            </div>
            <div class="col border-0">
                <div class="card show h-100 p-2">
                    <div class="d-flex justify-content-between ">
                        <div>
                            <p>Total User</p>
                            <h3>1190</h3>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" fill="currentColor" class="bi bi-person-workspace" viewBox="0 0 16 16">
                        <path d="M4 16s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-5.95a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5"/>
                        <path d="M2 1a2 2 0 0 0-2 2v9.5A1.5 1.5 0 0 0 1.5 14h.653a5.4 5.4 0 0 1 1.066-2H1V3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v9h-2.219c.554.654.89 1.373 1.066 2h.653a1.5 1.5 0 0 0 1.5-1.5V3a2 2 0 0 0-2-2z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- table -->
    <div>
        <table class="table">
            <tr>
                <th>ItemName</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Stock</th>
                <th>Price</th>
                <th>Simpler</th>
                <th>Action</th>
            </tr>
            <tr>
                <td>

                </td>
            </tr>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
