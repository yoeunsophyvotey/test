<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1 style="color: red; font-size: 40px;"><i>UnorderedList</i></h1>
        <ul style="color: blue; list-style-type: circle;">
            <li>Apple</li>
            <li>Banana</li>
            <li>Grape</li>
        </ul>

        <ol style="list-style-type: none;">
            <li>
                <a href="">Home</a>
            </li>
            <li>
                <a href="">Menu</a>
            </li>
            <li>
                <a href="">About</a>
            </li>
        </ol>

        <ul style="font-size: 35px; color: red; list-style-type: square;">
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>Bootstrap</li>
            <li>React.js</li>
        </ul>
</body>
</html>
