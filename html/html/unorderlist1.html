<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="color: darkred; font-size: 35px;">Unordered List Exercise</h1>
    <h1 style="font-size: 30px;">Example 1: Fruits</h1>
    <ul style="list-style-type: disc; font-size: 20px;">
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
        <li>Mango</li>
    </ul>
    <h1 style="font-size: 30px;">Example 2: School Supplies</h1>
    <ul style="list-style-type: square; font-size: 20px;">
        <li>Pen</li>
        <li>Notebook</li>
        <li>Ruler</li>
        <li>Eraser</li>
    </ul>
    <h1 style="font-size: 30px;">Example 3: Hobbies</h1>
    <ul style="list-style-type: circle; font-size: 20px;">
        <li>Reading</li>
        <li>Drawing</li>
        <li>Playing Football</li>
        <li>Listening to Music</li>
    </ul>
</body>
</html>
