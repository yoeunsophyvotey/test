<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1 style="text-align: center; color: red; font-size: 50px;"><i><u>Student List</u></i></h1>
    <hr size="5" color="red">
    <table align="center" border="1" style="border-spacing: 0px; width: 50%; font-size: 40px;"> 
        <thead>
            <tr>
                <th colspan="5" style="background-color: red;">Student List</th>
            </tr>
            <tr style="background-color: rgb(154, 154, 247);">
                <th rowspan="2">No</th>
                <th colspan="3">Student Information</th>
                <th rowspan="2" colspan="1">Remark</th>
            </tr>
            <tr style="background-color: yellow;">
                <th>Name</th>
                <th>Gender</th>
                <th>Score</th>
            </tr>
            <tbody style="background-color: white;">
                <tr>
                    <td>1</td>
                    <td>Votey</td>
                    <td>Female</td>
                    <td>98</td>
                    <td rowspan="4" style="text-align: center; background-color: green;">pass</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Lina</td>
                    <td>Female</td>
                    <td>82</td>
                    
                </tr>
                <tr>
                    <td>3</td>
                    <td>Jennie</td>
                    <td>Female</td>
                    <td>90</td>
                    
                </tr>
                <tr>
                    <td>4</td>
                    <td>Minji</td>
                    <td>Female</td>
                    <td>88</td>
                   
                </tr>
                <tr>
                    <td colspan="5" style="background-color: rgb(85, 85, 255);">Total Students=4</td>
                </tr>
            </tbody>

        </thead>
    </table>
</body>
</html>
