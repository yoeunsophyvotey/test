<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1 style="color: green; font-size: 45px; text-align: center;"><i><u>Know about the table tag</u></i></h1>
    <hr color="pink" size="5">
    <table border="1" align="center" style=" width: 60%; font-size: 29px; border-collapse: 2px; border: 2px solid grey; border-spacing: 0px; ">
        <tr style="background-color: green; color: pink;">
            <th>ID</th>
            <th>Name</th>
            <th>Gender</th>
            <th>Score</th>
        </tr>
        <tr style="color: green;" align="center">
            <td>1</td>
            <td>Votey</td>
            <td>Female</td>
            <td>100</td>
        </tr>
        <tr style="color: green;" align="center">
            <td>2</td>
            <td>Sey</td>
            <td>Male</td>
            <td>89</td>
        </tr>
        <tr style="color: green;" align="center">
            <td>3</td>
            <td>Lina</td>
            <td>Female</td>
            <td>79</td>
        </tr>
    </table>

</body>
</html>
