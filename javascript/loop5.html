<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="card w-50 m-auto p-5">
        <h1 class="">Enter loop number</h1>
        <input type="text" name="" id="num" class="mb-5 text-black ps-3 fs-4 rounded-4">
        <button type="button" onclick="Loop()" class="bg-danger fw-bold fs-4 rounded-4">Submit</button>
    </div>
    <div class="card overflow-hidden w-50 m-auto p-3 shadow">
        <h2 id="loop"></h2>
    </div>

    <script>
        function Loop(){
            let num = Number(document.getElementById("num").value);
            let text = "";
            let sum = 0;
            for(let i=2; i<=num ;i+=2){
                text += i + "+";
                sum += i;
            }
            document.getElementById("loop").innerHTML = text + "=" +sum;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
