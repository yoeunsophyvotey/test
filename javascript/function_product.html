<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <form class="card w-50 p-5 m-auto">
        <h1 class="text-danger fw-bold">Product Information</h1>
        <div class="row">
            <div class="col col-lg-12">
                <label class="text-black fw-bold fs-4">Code</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="code"><br>
            </div>
            <div class="col col-lg-12">
                <label class="text-black fw-bold fs-4">Product name</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="name"><br>
            </div>
            <div class="col col-lg-12">
                <label class="text-black fw-bold fs-4">Quantity</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="qty"><br>
            </div>
            <div class="col col-lg-12">
                <label class="text-black fw-bold fs-4">Price</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="price"><br>
            </div>
            <div class="col col-lg-12">
                <label class="text-black fw-bold fs-4">Tax</label>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="tax"><br>
            </div>
        </div>
        <div class="d-flex gap-3 justify-content-center">
            <button type="button" onclick="Product()" class="btn btn-primary text-light fw-bold">Submit</button>
            <button type="reset" class="btn btn-danger text-light fw-bold">Reset</button>
        </div>
    </form>
    <div class="container" >
        <div class="card p-3 mb-4">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Product name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Tax</th>
                        <th>Total</th>
                        <th>Discount</th>
                        <th>After discount</th>
                        <th>Total tax</th>
                        <th>Grand total</th>
                    </tr>
                </thead>
                <tbody id="result">
                    
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function Product(){
            let code = document.getElementById('code').value;
            let name = document.getElementById('name').value;
            let qty = Number(document.getElementById('qty').value);
            let price = Number(document.getElementById('price').value);
            let tax = Number(document.getElementById('tax').value);

            let total = qty*price;
            let dis;
            if(total>=100){
                dis = 50;
            }else if(total>=80){
                dis = 40;
            }else if(total>=60){
                dis = 30;
            }else if(total>=40){
                dis = 20;
            }else if(total>=20){
                dis = 10;
            }else{
                dis = 5;
            }

            let discount= total*dis/100;
            let afterDiscount = total - discount;
            let totalTax = afterDiscount*tax/100;
            let grandTotal = afterDiscount + totalTax;

            document.getElementById("result").innerHTML += `
                <tr>
                        <td>${code}</td>
                        <td>${name}</td>
                        <td>${qty}</td>
                        <td>${price}</td>
                        <td>${tax}</td>
                        <td>${total}</td>
                        <td>${discount}</td>
                        <td>${afterDiscount}</td>
                        <td>${totalTax}</td>
                        <td>${grandTotal}</td>
                    </tr>

            `;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
