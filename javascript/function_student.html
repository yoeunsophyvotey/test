    <form class="card w-50 p-5 m-auto">
        <h1 class="text-danger fw-bold">Student Infomation</h1>
        <div class="row">
            <div class="col col-lg-12">
                <label class="text-black fw-bold fs-4">ID</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="id"><br>
            </div>
            <div class="col col-lg-6">
                <label class="text-black fw-bold fs-4">Name</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="name"><br>
            </div>
            <div class="col col-lg-6">
                <label class="text-black fw-bold fs-4">Year</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="year"><br>
            </div>
            <div class="col col-lg-6">
                <label class="text-black fw-bold fs-4">HTML</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="html"><br>
            </div>
            <div class="col col-lg-6">
                <label class="text-black fw-bold fs-4">PHP</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="php"><br>
            </div>
            <div class="col col-lg-6">
                <label class="text-black fw-bold fs-4">CSS</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="css"><br>
            </div>
            <div class="col col-lg-6">
                <label class="text-black fw-bold fs-4">JavaScript</label><br>
                <input type="text" class="w-100 bg-dark bg-opacity-25 border-0 p-2 rounded-4 mb-3" id="javascript"><br>
            </div>
        </div>
        <div class="d-flex gap-3 justify-content-center">
            <button type="button" onclick="Student()" class="btn bg-danger text-light fw-bold">Submit</button>
            <button type="reset" onclick="" class="btn bg-primary text-light fw-bold">Reset</button>
        </div>
    </form>
    <div class="container" id="result">
        
    </div>

    <script>
        function Student(){
            let id = document.getElementById("id").value;
            let name = document.getElementById("name").value;
            let year = document.getElementById("year").value;
            let html = Number(document.getElementById("html").value);
            let php = Number(document.getElementById("php").value);
            let css = Number(document.getElementById("css").value);
            let javascript = Number(document.getElementById("javascript").value);

            let total = html + php + css + javascript;
            let avg = total / 4;
            let grade;
            if(avg >= 90){
                grade = "A";
            }else if(avg >= 80){
                grade = "B";
            }else if(avg >= 70){
                grade = "C";
            }else if(avg >= 60){
                grade = "D";
            }else if(avg >= 50){
                grade = "E";
            }else{
                grade = "F";
            }

            document.getElementById("result").innerHTML += `
            <div class="card p-3 mb-4">
            <h1 class="text-danger"><strong class="text-black">Name</strong>${name} <strong class="text-black">Year</strong>${year}</h1>
            <table class="table border-1 text-center fs-3">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>HTML</th>
                        <th>PHP</th>
                        <th>CSS</th>
                        <th>JavaScript</th>
                        <th>Total</th>
                        <th>Average</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>${id}</td>
                        <td>${html}</td>
                        <td>${php}</td>
                        <td>${css}</td>
                        <td>${javascript}</td>
                        <td>${total}</td>
                        <td>${avg}</td>
                        <td>${grade}</td>
                    </tr>
                </tbody>
            </table>
        </div>

            


            `;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
