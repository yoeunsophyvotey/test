<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <form class="card w-50 m-auto shadow rounded-4 p-5">
        <h1 class=" text-danger fw-bold">Product Online Shop</h1>
        <div class="row">
            <div class="col col-lg-6">
                <label class="fs-4 fw-bold rounded-3 text-black">Quantity</label>
                <input id="qty" type="text" class="text-danger fs-4 ps-4 fw-bold rounded-3 bg-dark bg-opacity-25 mb-2" ><br>
            </div>

            <div class="col col-lg-6">
                <label class="fs-4 fw-bold rounded-3 text-black">TaxRate</label>
                <input id="tax" type="text" class="text-danger fs-4 ps-4 fw-bold rounded-3 bg-dark bg-opacity-25 mb-2" ><br>
            </div>
        </div>
        <label class="fs-4 fw-bold text-black">Please choose Product</label><br>
        <select id="product" class="fs-4 fw-semibold p-2 rounded-4 mb-3">
            <option value="1200">Iphone17pro max 1200$</option>
            <option value="600">Smart watch 600$</option>
            <option value="800">Ipad mini 800$</option>
            <option value="1400">Macbook air 1400$</option>
        </div>  
        </select>
        <button type="button" onclick="Shop()" class="btn bg-primary text-white fs-4 fw-bold w-25 m-auto">Buy Now</button>
    </form>
    <div class="container">
        <div class="card p-3 mb-4">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>TaxRate</th>
                        <th>Total</th>
                        <th>TaxAmount</th>
                        <th>Payment</th>
                    </tr>
                </thead>
                <tbody id="result">
                    
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function Shop(){
            let price = Number(document.getElementById("product").value);
            let productName = product.options[product.selectedIndex].text;
            let qty = Number(document.getElementById("qty").value);
            let tax = Number(document.getElementById("tax").value);

            let total = price * qty;
            let taxAmount = total * tax / 100;
            let pay = total + taxAmount;

            document.getElementById("result").innerHTML += `
            
                    <tr>
                        <td>${productName}</td>
                        <td>${qty}</td>
                        <td>${price}</td>
                        <td>${tax}</td>
                        <td>${total}</td>
                        <td>${taxAmount}</td>
                        <td>${pay}</td>
                    </tr>
            `
            
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
